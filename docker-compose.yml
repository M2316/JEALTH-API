services:
  postgres-prod:
    image: postgres:16-alpine
    container_name: jealth-postgres-prod
    env_file:
      - .env.production
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - jealth

  api-prod:
    build:
      context: .
      dockerfile: Dockerfile
    image: jealth-api:prod
    container_name: jealth-api-prod
    depends_on:
      postgres-prod:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - jealth

  postgres-stage:
    image: postgres:16-alpine
    container_name: jealth-postgres-stage
    profiles: ["stage"]
    env_file:
      - .env.stage
    volumes:
      - postgres_stage_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - jealth

  api-stage:
    build:
      context: .
      dockerfile: Dockerfile
    image: jealth-api:stage
    container_name: jealth-api-stage
    profiles: ["stage"]
    depends_on:
      postgres-stage:
        condition: service_healthy
    env_file:
      - .env.stage
    environment:
      NODE_ENV: staging
      PORT: 3001
    ports:
      - "3001:3001"
    expose:
      - "3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - jealth

volumes:
  postgres_prod_data:
  postgres_stage_data:

networks:
  jealth:
    driver: bridge
